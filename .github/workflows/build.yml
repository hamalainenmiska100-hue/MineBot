name: Build MineBot IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Create Xcode project
        run: |
          mkdir TempProject
          cd TempProject
          swift package init --type executable
          rm -rf Sources/*
          cp ../*.swift Sources/
          swift package generate-xcodeproj

      - name: Build
        run: |
          cd TempProject
          xcodebuild \
            -project TempProject.xcodeproj \
            -scheme TempProject \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package IPA
        run: |
          mkdir Payload
          cp -R TempProject/build/Build/Products/Release-iphoneos/*.app Payload/
          zip -r MineBot.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: MineBot-IPA
          path: MineBot.ipa
