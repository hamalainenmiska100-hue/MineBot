name: Build MineBot

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile executable
        run: |
          xcrun swiftc \
          -parse-as-library \
          -target arm64-apple-ios15.0 \
          -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
          -framework UIKit \
          main.swift \
          -o MineBot

      - name: Create app bundle
        run: |
          mkdir -p Payload/MineBot.app
          cp MineBot Payload/MineBot.app/
          cp Info.plist Payload/MineBot.app/

      - name: Create IPA
        run: |
          zip -r MineBot.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MineBot
          path: MineBot.ipa
