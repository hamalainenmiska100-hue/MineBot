name: Build MineBot IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          pwd
          ls -la
          xcodebuild -version

      - name: List project schemes
        run: |
          xcodebuild -list -project MineBot.xcodeproj

      - name: Resolve Swift Package Dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project MineBot.xcodeproj

      - name: Build app
        run: |
          xcodebuild \
            -project MineBot.xcodeproj \
            -scheme MineBot \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Inspect build output
        run: |
          echo "Products:"
          ls -la build/Build/Products
          echo ""
          echo "Release-iphoneos:"
          ls -la build/Build/Products/Release-iphoneos
          echo ""
          echo "App bundle:"
          ls -la build/Build/Products/Release-iphoneos/MineBot.app

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/MineBot.app Payload/
          zip -r MineBot.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MineBot-IPA
          path: MineBot.ipa
