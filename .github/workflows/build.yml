name: Build MineBot IPA

on:
  push:
  workflow_dispatch:

jobs:
  build:

    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build .app
        run: |
          xcodebuild \
          -project MineBot.xcodeproj \
          -scheme MineBot \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          build

      - name: Create Payload folder
        run: |
          mkdir Payload
          cp -r build/Release-iphoneos/MineBot.app Payload/

      - name: Create IPA
        run: |
          zip -r MineBot.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MineBot-IPA
          path: MineBot.ipa
