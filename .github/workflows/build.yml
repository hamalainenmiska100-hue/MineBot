name: Build MineBot IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Compile app binary
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          xcrun swiftc \
            -target arm64-apple-ios16.0 \
            -sdk $SDK \
            -framework SwiftUI \
            -framework UIKit \
            -parse-as-library \
            *.swift \
            -o MineBot

          chmod +x MineBot

      - name: Create app bundle
        run: |
          mkdir -p Payload/MineBot.app
          cp MineBot Payload/MineBot.app/
          cp Info.plist Payload/MineBot.app/

      - name: Package IPA
        run: |
          zip -r MineBot.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: MineBot-IPA
          path: MineBot.ipa
